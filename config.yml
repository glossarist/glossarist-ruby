# This file can be used to configure enum attributes in the model.
# For example to add different allowed values for Abbreviation::Type
# you can change the values under abbreviation => type
#
# NOTE: All the keys in this file are needed for the script to run
#       and should not be removed. You can change the values but atleast
#       one option should be present in each list.

concept_source:
  status:
    - identical
    - similar
    - modified
    - restyle
    - context_added
    - generalisation
    - specialisation
    - unspecified
    - related
    - not_equal
  type:
    - authoritative
    - lineage

designation:
  base:
    normative_status:
      - preferred
      - admitted
      - deprecated
      - superseded
  relationship_type:
    # Term-level (designation-to-designation within the same concept entry)
    - abbreviated_form_for
    - short_form_for

related_concept:
  type:
    # Lifecycle (ISO 10241-1 / ISO 19135)
    - deprecates
    - deprecated_by
    - supersedes
    - superseded_by
    - replaces
    - replaced_by
    - invalidates
    - invalidated_by
    - retires
    - retired_by
    # Hierarchical (ISO 10241-1 / ISO 25964)
    - narrower
    - broader
    # Hierarchical sub-types — ISO 25964 generic (BTG/NTG)
    - broader_generic
    - narrower_generic
    # Hierarchical sub-types — ISO 25964 partitive (BTP/NTP)
    - broader_partitive
    - narrower_partitive
    - has_part
    - is_part_of
    # Hierarchical sub-types — ISO 25964 instantial (BTI/NTI)
    - broader_instantial
    - narrower_instantial
    - instance_of
    - has_instance
    # Equivalence (ISO 10241-1 / ISO 25964 exactMatch / SKOS)
    - equivalent
    - exact_match
    # Approximate equivalence (ISO 25964 closeMatch / SKOS)
    - close_match
    # Cross-vocabulary mapping (SKOS)
    - broad_match
    - narrow_match
    - related_match
    # Comparative (ISO 10241-1)
    - compare
    - contrast
    # Associative (ISO 10241-1 / ISO 25964 RT / TBX crossReference)
    - see
    - references
    # Associative sub-types (ISO 25964 / TBX)
    - related_concept
    - related_concept_broader
    - related_concept_narrower
    # Associative — spatial/temporal (ISO 25964 / TBX)
    - sequentially_related
    - spatially_related
    - temporally_related
    # Lexical (ISO 12620 / TBX)
    - homograph
    - false_friend
    # Register management (ISO 19135)
    - has_concept
    - is_concept_of
    - has_definition
    - definition_of
    - inherits
    - inherited_by
    # Versioning / definitional (ISO 19135)
    - has_version
    - version_of
    - current_version
    - current_version_of

iso12620:
  term_type:
    # ISO 12620 term type classification for designations.
    # Orthographic / structural:
    - abbreviation
    - acronym
    - clipped_term
    - full_form
    - initialism
    - short_form
    - transliterated_form
    - transcribed_form
    - truncation
    - variant
    # Symbolic / formulaic:
    - code
    - equation
    - figure_symbol
    - formula
    - graphic_symbol
    - letter_symbol
    - logical_expression
    - mathematical_expression
    - reference_symbol
    - roman_numeral
    - symbol
    # Usage / provenance:
    - common_name
    - entry_term
    - internationalism
    - international_scientific_term
    - part_number
    - phrase
    - phraseological_unit
    - scientific_name
    - shortcut
    - sku
    - standard_text
    - synonym
    - synonymous_phrase

abbreviation:
  type:
    - truncation
    - acronym
    - initialism

grammar_info:
  boolean_attribute:
    - participle
    - adj
    - verb
    - adverb
    - noun
    - preposition
  gender:
    - m
    - f
    - n
    - c
  number:
    - singular
    - dual
    - plural
    - mass
    - other_number

concept:
  status:
    - draft
    - submitted
    - not_valid
    - invalid
    - valid
    - superseded
    - retired

concept_date:
  type:
    - accepted
    - amended
    - retired
    - review
    - review_decision
