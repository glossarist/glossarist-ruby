      source: "IEC"
      id: "102-03-03"

  # ── ISO 25964 Generic Hierarchy (BTG/NTG) ─────────────────────────────
  # "is a kind of" — generic/specific relationship
  - type: broader_generic
    content: "physical system"
    ref:
      source: "IEC"
      id: "102-01-01"

  - type: narrower_generic
    content: "closed system"
